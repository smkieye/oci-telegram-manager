<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>验证码</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#020617,#0f172a);color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(420px,92vw);background:#111827;border:1px solid #334155;border-radius:20px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.35)}input,button{width:100%;padding:12px;border-radius:12px;border:1px solid #334155;margin-top:10px;background:#020617;color:#e5e7eb;font-size:18px;letter-spacing:3px;text-align:center}button{background:#0369a1;cursor:pointer;letter-spacing:0}.muted{color:#94a3b8}.danger{color:#fca5a5}</style></head><body><div class="card"><h1>Telegram 验证码</h1><p class="muted">我已把 6 位验证码发送到允许控制此 Bot 的 Telegram 用户。验证码 5 分钟内有效。</p>{% if request.query_params.get('error') %}<p class="danger">验证码错误，请重试。</p>{% endif %}<form method="post" action="/verify"><input name="code" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" placeholder="000000" autofocus required><button type="submit">完成登录</button></form></div></body></html>
