<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>登录 OCI Manager</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#020617,#0f172a);color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(420px,92vw);background:#111827;border:1px solid #334155;border-radius:20px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.35)}input,button{width:100%;padding:12px;border-radius:12px;border:1px solid #334155;margin-top:10px;background:#020617;color:#e5e7eb}button{background:#0369a1;cursor:pointer}.muted{color:#94a3b8}.danger{color:#fca5a5}</style></head><body><div class="card"><h1>OCI Manager Web</h1><p class="muted">请输入 Web 管理密码。</p>{% if not web_enabled %}<p class="danger">WEB_ADMIN_PASSWORD 未配置，Web 登录已禁用。</p>{% endif %}{% if request.query_params.get('error') %}<p class="danger">密码错误。</p>{% endif %}<form method="post" action="/login"><input type="password" name="password" placeholder="管理密码" autofocus><button type="submit">登录</button></form></div></body></html>
