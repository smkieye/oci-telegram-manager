<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'OCI Manager' }}</title>
  <style>
    :root{--bg:#0f172a;--panel:#111827;--card:#1f2937;--muted:#94a3b8;--text:#e5e7eb;--brand:#38bdf8;--ok:#22c55e;--danger:#ef4444;--line:#334155}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#020617,#111827);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    a{color:inherit;text-decoration:none}.wrap{max-width:1120px;margin:0 auto;padding:18px}.nav{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px}.navlinks{display:flex;gap:8px;flex-wrap:wrap}.nav a,.btn{background:#1e293b;border:1px solid var(--line);border-radius:12px;padding:9px 14px;display:inline-block}.nav a:hover,.btn:hover{border-color:var(--brand)}
    .brand{font-weight:800;color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:rgba(31,41,55,.86);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    .muted{color:var(--muted)}.ok{color:var(--ok)}.danger{color:var(--danger)} h1,h2,h3{margin:.2rem 0 1rem}.kv{line-height:1.9}.kv b{display:inline-block;min-width:110px;color:#cbd5e1}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    input,textarea,select{width:100%;padding:10px 12px;margin:6px 0 12px;background:#0f172a;color:var(--text);border:1px solid var(--line);border-radius:10px} label{color:#cbd5e1;font-size:14px}.btn{cursor:pointer;color:var(--text)}button.btn{font:inherit}.primary{background:#0369a1}.success{background:#166534}.danger-bg{background:#7f1d1d}.pre{white-space:pre-wrap;background:#020617;border:1px solid var(--line);padding:14px;border-radius:12px}.topnote{margin-bottom:12px;color:#bae6fd}
  </style>
</head>
<body><div class="wrap">
  <div class="nav">
    <div class="brand">⚡ OCI Manager Web</div>
    <div class="navlinks">
      <a href="/">首页</a><a href="/accounts">账号</a><a href="/instances">实例</a><a href="/sniper">抢机</a><a href="/settings">安全设置</a>
      <form method="post" action="/logout" style="display:inline"><button class="btn" type="submit">退出</button></form>
    </div>
  </div>
  {% block content %}{% endblock %}
</div></body></html>
